[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 25

[browser]
gatherUsageStats = false

[client]
# Hide Streamlit toolbar (incl. "Manage app" button) to prevent overlap with sidebar nav
toolbarMode = "minimal"
# Note: 'initialSidebarState' sudah dihapus di Streamlit 1.32+
# Pakai CSS [aria-expanded] di streamlit-overrides.css untuk hide sidebar by default

[theme]
base = "light"
primaryColor = "#7c3aed"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"

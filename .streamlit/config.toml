[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 25

[browser]
gatherUsageStats = false

[client]
# Hide Streamlit toolbar (incl. "Manage app" button) to prevent overlap with sidebar nav
toolbarMode = "minimal"
# Sidebar hidden by default seperti Cursor IDE - click ">" button di header untuk buka
initialSidebarState = "collapsed"

[theme]
base = "light"
primaryColor = "#7c3aed"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"

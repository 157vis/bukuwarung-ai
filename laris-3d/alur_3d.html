<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>laris.AI — Diagram Alur 3D (Demo)</title>
<style>
  body { margin:0; overflow:hidden; background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 60%, #020617 100%); font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:#fff; }
  #wrap { position:fixed; inset:0; }
  #panel { position:fixed; left:1.5rem; bottom:1.5rem; max-width:380px; background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.18); border-radius:1rem; padding:1.25rem 1.4rem; line-height:1.45; }
  #panel h2 { margin:0 0 .55rem 0; font-size:1.1rem; }
  #panel p  { margin:0; opacity:.92; font-size:.92rem; }
  #panel .tip { margin-top:.55rem; opacity:.65; font-size:.78rem; }
  #legend { position:fixed; right:1.5rem; top:1.25rem; background: rgba(255,255,255,0.06); backdrop-filter: blur(8px); border:1px solid rgba(255,255,255,0.15); border-radius:.75rem; padding:.85rem 1rem; font-size:.82rem; line-height:1.6; }
  #legend b { color:#34d399; }
  #credit { position:fixed; right:1rem; bottom:.6rem; opacity:.45; font-size:.72rem; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#0f172a; color:#34d399; font-size:.95rem; transition: opacity .6s; z-index:10; }
  #loading.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="wrap"></div>
<div id="loading">⏳ Menyiapkan diagram 3D…</div>
<div id="panel">
  <h2>🛠️ Alur Data UMKM</h2>
  <p id="deskripsi">Drag untuk memutar · Scroll untuk zoom · Klik node untuk melihat detail.</p>
  <div class="tip">4 node, 3 jalur data, ~120 partikel hidup.</div>
</div>
<div id="legend">
  <div><b>● Hijau</b> Sumber (WhatsApp)</div>
  <div><b>● Ungu</b> AI Processing</div>
  <div><b>● Biru</b> Database</div>
  <div><b>● Kuning</b> Dashboard</div>
</div>
<div id="credit">laris.AI · Three.js demo</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

const wrap = document.getElementById('wrap');
const loading = document.getElementById('loading');
const deskripsi = document.getElementById('deskripsi');

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 4, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 6;
controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI * 0.85;

scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const key = new THREE.DirectionalLight(0xffffff, 1.0);
key.position.set(5, 8, 5);
scene.add(key);
const fill = new THREE.PointLight(0x34d399, 1.0, 30);
fill.position.set(-6, 3, 4);
scene.add(fill);
const rim = new THREE.PointLight(0x7c4dff, 0.8, 30);
rim.position.set(6, -2, -4);
scene.add(rim);

// Ground plane (subtle grid)
const grid = new THREE.GridHelper(20, 20, 0x1e293b, 0x1e293b);
grid.position.y = -2.2;
scene.add(grid);

// === Node ===
const NODES = [
  { key: 'wa',   pos: [-4.5, 0, 0], color: 0x10b981, label: 'WhatsApp',  desc: '"jual kopi 50rb" → pesan Owner.' },
  { key: 'ai',   pos: [-1.5, 0, 0], color: 0x7c4dff, label: 'Admin AI',  desc: 'Parsing Groq: kategori, nominal, tanggal.' },
  { key: 'db',   pos: [ 1.5, 0, 0], color: 0x3b82f6, label: 'Supabase',  desc: 'Simpan + RLS: hanya owner toko itu.' },
  { key: 'dash', pos: [ 4.5, 0, 0], color: 0xf59e0b, label: 'Dashboard', desc: 'Statistik, Laris Score, AI Insight.' },
];
const nodes = {};
const nodeMeshes = [];

const sphereGeo = new THREE.SphereGeometry(0.7, 48, 48);
NODES.forEach((n) => {
  const mat = new THREE.MeshStandardMaterial({
    color: n.color, metalness: 0.55, roughness: 0.25,
    emissive: n.color, emissiveIntensity: 0.35,
  });
  const mesh = new THREE.Mesh(sphereGeo, mat);
  mesh.position.set(...n.pos);
  mesh.userData = n;
  scene.add(mesh);
  nodes[n.key] = mesh;
  nodeMeshes.push(mesh);

  // Halo ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.95, 0.04, 16, 64),
    new THREE.MeshBasicMaterial({ color: n.color, transparent: true, opacity: 0.55 })
  );
  ring.position.set(...n.pos);
  ring.userData.basePhase = Math.random() * Math.PI * 2;
  scene.add(ring);
  nodeMeshes.push(ring);
});

// === Tabung penghubung (TubeGeometry) antar node ===
const NODE_LIST = Object.values(nodes);

function makeTube(a, b, color) {
  const curve = new THREE.CatmullRomCurve3([a, b]);
  const geo = new THREE.TubeGeometry(curve, 24, 0.05, 12, false);
  const mat = new THREE.MeshStandardMaterial({
    color, metalness: 0.7, roughness: 0.3,
    emissive: color, emissiveIntensity: 0.4,
  });
  return new THREE.Mesh(geo, mat);
}

const tubes = [
  makeTube(nodes.wa.position,   nodes.ai.position,   0x34d399),
  makeTube(nodes.ai.position,   nodes.db.position,   0x7c4dff),
  makeTube(nodes.db.position,   nodes.dash.position, 0x60a5fa),
];
tubes.forEach((t) => scene.add(t));

// === Partikel data yang mengalir di dalam tabung ===
const PARTICLE_COUNT = 120;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const segments = [
  { from: nodes.wa.position,   to: nodes.ai.position,   color: new THREE.Color(0x34d399), t: 0 },
  { from: nodes.ai.position,   to: nodes.db.position,   color: new THREE.Color(0xa78bfa), t: 0 },
  { from: nodes.db.position,   to: nodes.dash.position, color: new THREE.Color(0x93c5fd), t: 0 },
];
const particles = [];
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const seg = segments[i % segments.length];
  particles.push({
    seg,
    speed: 0.18 + Math.random() * 0.32,
    offset: Math.random(),
    size: 0.06 + Math.random() * 0.07,
  });
}
function updateParticles(t) {
  const pos = particleGeo.attributes.position.array;
  const col = particleGeo.attributes.color.array;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = particles[i];
    const u = (t * p.speed + p.offset) % 1;
    const x = p.seg.from.x + (p.seg.to.x - p.seg.from.x) * u;
    const y = p.seg.from.y + (p.seg.to.y - p.seg.from.y) * u;
    const z = p.seg.from.z + (p.seg.to.z - p.seg.from.z) * u;
    pos[i*3+0] = x; pos[i*3+1] = y; pos[i*3+2] = z;
    col[i*3+0] = p.seg.color.r; col[i*3+1] = p.seg.color.g; col[i*3+2] = p.seg.color.b;
  }
  particleGeo.attributes.position.needsUpdate = true;
  particleGeo.attributes.color.needsUpdate = true;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
const particleMat = new THREE.PointsMaterial({
  size: 0.18, vertexColors: true, transparent: true, opacity: 0.95,
  sizeAttenuation: true,
});
const points = new THREE.Points(particleGeo, particleMat);
scene.add(points);

// === Label teks 3D (di atas tiap node) ===
const fontLoader = new FontLoader();
fontLoader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_regular.typeface.json', (font) => {
  NODES.forEach((n) => {
    const tg = new TextGeometry(n.label, {
      font, size: 0.32, height: 0.05,
      curveSegments: 6, bevelEnabled: false,
    });
    tg.computeBoundingBox();
    const w = tg.boundingBox.max.x - tg.boundingBox.min.x;
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const m = new THREE.Mesh(tg, mat);
    m.position.set(n.pos[0] - w/2, n.pos[1] + 1.0, n.pos[2]);
    scene.add(m);
  });
  loading.classList.add('hidden');
});

// Fallback: kalau font gagal load, sembunyikan loading juga
setTimeout(() => loading.classList.add('hidden'), 4000);

// === Interaksi: hover + klik ===
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hover = null;

addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
});
addEventListener('click', () => {
  if (hover && hover.userData.desc) {
    deskripsi.textContent = hover.userData.desc;
  } else {
    deskripsi.textContent = 'Drag untuk memutar · Scroll untuk zoom · Klik node untuk melihat detail.';
  }
});

function loop(t) {
  requestAnimationFrame(loop);
  controls.update();

  // Pulse halo
  nodeMeshes.forEach((m, i) => {
    if (m.userData.basePhase !== undefined) {
      m.rotation.z += 0.005;
      const s = 1 + Math.sin(t/700 + m.userData.basePhase) * 0.04;
      m.scale.setScalar(s);
    } else if (m.material && m.geometry.type === 'SphereGeometry') {
      m.rotation.y += 0.003;
    }
  });

  // Float nodes sedikit
  Object.values(nodes).forEach((m, i) => {
    m.position.y = Math.sin(t/1000 + i*0.7) * 0.12;
  });

  updateParticles(t/1000);

  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(Object.values(nodes));
  hover = hits[0]?.object || null;
  document.body.style.cursor = hover ? 'pointer' : 'default';

  renderer.render(scene, camera);
}
loop(0);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>

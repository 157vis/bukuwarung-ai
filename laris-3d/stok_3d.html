<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>laris.AI — Rak Stok 3D (Demo)</title>
<style>
  body { margin:0; overflow:hidden; background: linear-gradient(180deg,#fef9c3 0%, #fde68a 100%); font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:#1f2937; }
  #wrap { position:fixed; inset:0; }
  #panel { position:fixed; left:1.25rem; top:1.25rem; max-width:340px; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); border:1px solid rgba(0,0,0,0.06); border-radius:.9rem; padding:1rem 1.15rem; line-height:1.45; box-shadow:0 12px 32px rgba(15,23,42,0.12); }
  #panel h2 { margin:0 0 .4rem 0; font-size:1.05rem; color:#0f172a; }
  #panel p  { margin:0; font-size:.88rem; color:#475569; }
  #panel .tip { margin-top:.5rem; font-size:.78rem; color:#64748b; }
  #legend { position:fixed; right:1.25rem; top:1.25rem; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); border:1px solid rgba(0,0,0,0.06); border-radius:.75rem; padding:.7rem .85rem; font-size:.78rem; line-height:1.65; box-shadow:0 8px 22px rgba(15,23,42,0.08); }
  #legend span { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  #info { position:fixed; left:50%; bottom:1.25rem; transform:translateX(-50%); background: rgba(15,23,42,0.92); color:#fff; padding:.7rem 1.1rem; border-radius:.7rem; font-size:.88rem; opacity:0; transition: opacity .25s; pointer-events:none; max-width:90%; text-align:center; }
  #info.show { opacity:1; }
  #info b { color:#fde68a; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#fef9c3; color:#92400e; font-size:.95rem; z-index:10; transition: opacity .5s; }
  #loading.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="wrap"></div>
<div id="loading">📦 Menyiapkan rak 3D…</div>
<div id="panel">
  <h2>📦 Rak Stok UMKM</h2>
  <p>Drag untuk memutar · Scroll untuk zoom · Klik kotak untuk lihat detail barang.</p>
  <div class="tip">Warna kotak = kategori. Kotak merah = stok menipis.</div>
</div>
<div id="legend">
  <div><span style="background:#10b981"></span>Minuman</div>
  <div><span style="background:#3b82f6"></span>Makanan</div>
  <div><span style="background:#a855f7"></span>Snack</div>
  <div><span style="background:#f59e0b"></span>Bahan Dapur</div>
  <div><span style="background:#ef4444"></span>Stok Menipis</div>
</div>
<div id="info"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

const wrap = document.getElementById('wrap');
const loading = document.getElementById('loading');
const info = document.getElementById('info');
let infoTimer = null;
function showInfo(text) {
  info.innerHTML = text;
  info.classList.add('show');
  clearTimeout(infoTimer);
  infoTimer = setTimeout(() => info.classList.remove('show'), 3000);
}

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(7, 6, 9);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 5;
controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI * 0.48;
controls.target.set(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 1.0);
key.position.set(6, 10, 5);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.left = -10;
key.shadow.camera.right = 10;
key.shadow.camera.top = 10;
key.shadow.camera.bottom = -10;
scene.add(key);
const fill = new THREE.PointLight(0xfde68a, 0.6, 30);
fill.position.set(-5, 4, -3);
scene.add(fill);

// Lantai
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0xfef3c7, roughness: 0.9 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.5;
floor.receiveShadow = true;
scene.add(floor);

// === Rak: 3 shelf × 5 kolom × 4 baris = 60 kotak produk ===
const SHELF_COLS = 5;
const SHELF_ROWS = 4;
const SHELF_COUNT = 3;

const PRODUCTS = {
  '#10b981': ['Kopi Sachet', 'Teh Botol', 'Air Mineral 600ml', 'Es Teh Manis', 'Susu UHT', 'Jus Jeruk', 'Kopi Susu', 'Teh Hijau', 'Air Lemon', 'Coklat Panas', 'Bandrek', 'Bir Bintang'],
  '#3b82f6': ['Nasi Goreng', 'Mie Goreng', 'Roti Bakar', 'Lontong Sayur', 'Nasi Uduk', 'Mie Ayam', 'Sate Madura', 'Bakso', 'Soto Betawi', 'Gado-Gado', 'Nasi Padang', 'Pecel Lele'],
  '#a855f7': ['Chitato', 'Tango', 'Oreo', 'Beng-Beng', 'Taro', 'Qtela', 'Cheetos', 'Pocky', 'KitKat', 'Silverqueen', 'Biskuit Roma', 'Better'],
  '#f59e0b': ['Gula Pasir 1kg', 'Minyak Goreng', 'Tepung Terigu', 'Bumbu Dapur', 'Garam', 'Bawang Merah', 'Bawang Putih', 'Cabai', 'Kecap Manis', 'Saus Sambal', 'Penyedap', 'Micin'],
};

const shelfGroup = new THREE.Group();
scene.add(shelfGroup);

const racks = [];
const shelfZStart = -3.2;
const shelfSpacing = 3.2;

for (let s = 0; s < SHELF_COUNT; s++) {
  const z = shelfZStart + s * shelfSpacing;

  // Frame rak
  const frame = new THREE.Group();
  const poleGeo = new THREE.BoxGeometry(0.15, 4, 0.15);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x78716c, metalness: 0.6, roughness: 0.4 });
  const positions = [
    [-2.7, 1.5, z - 0.4], [2.7, 1.5, z - 0.4],
    [-2.7, 1.5, z + 0.4], [2.7, 1.5, z + 0.4],
  ];
  positions.forEach(([x, y, pz]) => {
    const p = new THREE.Mesh(poleGeo, poleMat);
    p.position.set(x, y, pz);
    p.castShadow = true;
    frame.add(p);
  });

  // 4 shelf board
  const boardGeo = new THREE.BoxGeometry(5.6, 0.08, 0.9);
  const boardMat = new THREE.MeshStandardMaterial({ color: 0xa8a29e, roughness: 0.7 });
  for (let r = 0; r <= SHELF_ROWS; r++) {
    const y = -0.4 + r * 1.33;
    const b = new THREE.Mesh(boardGeo, boardMat);
    b.position.set(0, y, z);
    b.castShadow = true; b.receiveShadow = true;
    frame.add(b);

    // Kotak produk di atas board (kecuali board paling atas)
    if (r < SHELF_ROWS) {
      const yStack = y + 0.04;
      for (let c = 0; c < SHELF_COLS; c++) {
        const x = -2.4 + c * 1.2;
        const colorKeys = Object.keys(PRODUCTS);
        const color = colorKeys[(s + c + r) % colorKeys.length];
        const productList = PRODUCTS[color];
        const product = productList[(s * 7 + c * 3 + r * 5) % productList.length];

        // Random stok: 0-3 = menipis (merah), 4-12 = normal
        const stockRoll = (s * 13 + c * 11 + r * 17) % 13;
        const isLow = stockRoll < 3;
        const stock = isLow ? stockRoll + 1 : stockRoll + 4;
        const fillColor = isLow ? 0xef4444 : color;
        const fillHex = isLow ? '#ef4444' : color;

        // Bentuk stack: 1-3 kotak stacked
        const stack = [];
        const baseSize = 0.85;
        for (let k = 0; k < Math.min(stock, 3); k++) {
          const sizeJitter = 1 - k * 0.05;
          const geom = new THREE.BoxGeometry(baseSize * sizeJitter, 0.85 * sizeJitter, 0.75 * sizeJitter);
          const mat = new THREE.MeshStandardMaterial({
            color: fillColor, metalness: 0.05, roughness: 0.7,
            emissive: fillColor, emissiveIntensity: 0.12,
          });
          const box = new THREE.Mesh(geom, mat);
          box.position.set(x + (k % 2 === 0 ? 0 : 0.02), yStack + 0.45 + k * 0.85, z);
          box.castShadow = true;
          box.receiveShadow = true;
          box.userData = { product, category: color, stock, hex: fillHex };
          frame.add(box);
          stack.push(box);
        }
        racks.push(...stack);
      }
    }
  }

  shelfGroup.add(frame);
}

// === Label kategori di atas rak ===
const fontLoader = new FontLoader();
fontLoader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_regular.typeface.json', (font) => {
  const CATEGORIES = ['MINUMAN', 'MAKANAN', 'SNACK & BAHAN'];
  for (let s = 0; s < SHELF_COUNT; s++) {
    const z = shelfZStart + s * shelfSpacing;
    const tg = new TextGeometry(CATEGORIES[s], {
      font, size: 0.3, height: 0.04, curveSegments: 4, bevelEnabled: false,
    });
    tg.computeBoundingBox();
    const w = tg.boundingBox.max.x - tg.boundingBox.min.x;
    const m = new THREE.Mesh(tg, new THREE.MeshBasicMaterial({ color: 0x78350f }));
    m.position.set(-w/2, 4.8, z);
    scene.add(m);
  }
  loading.classList.add('hidden');
});
setTimeout(() => loading.classList.add('hidden'), 4000);

// === Interaksi ===
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hover = null;

addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
});
addEventListener('click', () => {
  if (hover) {
    const { product, category, stock, hex } = hover.userData;
    const tone = hex === '#ef4444' ? '⚠️ Stok menipis!' : '✅ Stok aman';
    showInfo(`<b>${product}</b> · ${tone} · ${stock} unit · <span style="color:${hex}">●</span>`);
  }
});

function loop(t) {
  requestAnimationFrame(loop);
  controls.update();

  // Subtle float animation per rak
  racks.forEach((r, i) => {
    r.position.y += Math.sin(t/1500 + i) * 0.0006;
  });

  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(racks);
  hover = hits[0]?.object || null;
  document.body.style.cursor = hover ? 'pointer' : 'default';

  // Highlight hover dengan emissive boost
  racks.forEach(r => {
    const base = (r.userData.hex === '#ef4444') ? 0.12 : 0.12;
    r.material.emissiveIntensity = (r === hover) ? 0.55 : base;
  });

  renderer.render(scene, camera);
}
loop(0);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>

[build]
builder = "NIXPACKS"

[deploy]
# Pakai 'python -m streamlit' agar bisa dipanggil walaupun script
# 'streamlit' tidak di-PATH (umum di Nixpacks runtime).
startCommand = "python -m streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[build]
builder = "NIXPACKS"

[deploy]
# Root Directory di Railway diset ke / (root repo), sehingga SELURUH
# repo (paths.py, brand.py, laris_core.py, dll) ter-deploy ke /app/.
# Start command reference module path lengkap.
startCommand = "python -m uvicorn kita-cuan-wa-bot.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[build]
builder = "NIXPACKS"

[deploy]
# Root Directory = kita-cuan-wa-bot (sub-folder). Setelah cd ke
# sub-folder, package 'kita-cuan-wa-bot' tidak ada di sys.path (cwd
# sudah di dalamnya). Jadi start command reference 'main' langsung,
# bukan 'kita-cuan-wa-bot.main'.
startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
